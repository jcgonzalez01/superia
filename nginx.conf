server {
    listen 80;
    server_name _;
    root /app;
    index index.html;

    add_header Cache-Control "no-cache" always;

    location ~* \.(png|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy directo a Anthropic API (resuelve CORS)
    location = /proxy/v1/messages {
        proxy_pass https://api.anthropic.com/v1/messages;
        proxy_ssl_server_name on;
        proxy_set_header Host api.anthropic.com;
        proxy_pass_request_headers on;
        proxy_read_timeout 30s;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, x-api-key, anthropic-version" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
